name: Build Desktop Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.38.7'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        working-directory: apps/api_inspector_desktop
        run: flutter pub get

      - name: Build macOS app
        working-directory: apps/api_inspector_desktop
        run: flutter build macos --release

      - name: Create macOS archive
        run: |
          cd apps/api_inspector_desktop/build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/api-inspector-macos.zip" api_inspector_desktop.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-inspector-macos
          path: api-inspector-macos.zip
          retention-days: 90

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        working-directory: apps/api_inspector_desktop
        run: flutter pub get

      - name: Build Windows app
        working-directory: apps/api_inspector_desktop
        run: flutter build windows --release

      - name: Create Windows archive
        run: |
          Compress-Archive -Path "apps/api_inspector_desktop/build/windows/x64/runner/Release/*" -DestinationPath "api-inspector-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-inspector-windows
          path: api-inspector-windows.zip
          retention-days: 90
